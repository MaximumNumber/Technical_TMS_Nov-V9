<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — الصفحة غير موجودة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --c1: #020c12; --c2: #093347; --c3: #17616c;
      --accent: #00cdb8; --gold: #f5a623;
    }
    body {
      font-family: 'Tajawal', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--c1);
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    /* Animated mesh background */
    .bg-mesh {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 65% 55% at 85% 15%, rgba(0,205,184,0.18) 0%, transparent 55%),
        radial-gradient(ellipse 55% 65% at 15% 85%, rgba(23,97,108,0.22) 0%, transparent 55%),
        radial-gradient(ellipse 45% 45% at 50% 50%, rgba(9,51,71,0.8) 0%, transparent 80%),
        linear-gradient(175deg, #020c12 0%, #061b24 40%, #093347 70%, #0d4560 100%);
      z-index: 0;
    }
    .grid-pattern {
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(0,205,184,0.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,205,184,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    /* Floating orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 {
      width: 500px; height: 500px;
      top: -180px; right: -180px;
      background: radial-gradient(circle, rgba(0,205,184,0.1) 0%, transparent 65%);
      animation: drift1 12s ease-in-out infinite;
    }
    .orb-2 {
      width: 380px; height: 380px;
      bottom: -120px; left: -120px;
      background: radial-gradient(circle, rgba(23,97,108,0.14) 0%, transparent 65%);
      animation: drift2 16s ease-in-out infinite;
    }
    .orb-3 {
      width: 220px; height: 220px;
      top: 45%; left: 35%;
      background: radial-gradient(circle, rgba(0,205,184,0.06) 0%, transparent 65%);
      animation: drift3 9s ease-in-out infinite;
    }
    @keyframes drift1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-30px,35px) scale(1.08)} }
    @keyframes drift2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(25px,-30px) scale(1.06)} }
    @keyframes drift3 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(15px,18px) scale(1.12)} }

    /* Main content */
    .err-container {
      text-align: center;
      position: relative;
      z-index: 2;
      padding: 2.5rem 2rem;
      max-width: 560px;
      animation: reveal 0.7s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes reveal {
      from { opacity:0; transform:translateY(28px) scale(0.97); }
      to   { opacity:1; transform:translateY(0)    scale(1); }
    }

    /* Glass card */
    .err-glass {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 3rem 2.5rem;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,205,184,0.08);
      position: relative;
      overflow: hidden;
    }
    .err-glass::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.7;
    }

    .err-code {
      font-size: 9rem;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -10px;
      background: linear-gradient(135deg, var(--accent) 0%, rgba(255,255,255,0.9) 50%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.25rem;
      animation: float 5s ease-in-out infinite;
      text-shadow: none;
      filter: drop-shadow(0 0 40px rgba(0,205,184,0.3));
    }
    @keyframes float {
      0%,100% { transform: translateY(0) rotate(-1deg); }
      50%      { transform: translateY(-14px) rotate(1deg); }
    }

    .err-icon-wrap {
      width: 86px; height: 86px;
      background: rgba(0,205,184,0.1);
      border-radius: 26px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.75rem;
      font-size: 2.4rem;
      color: var(--accent);
      border: 1px solid rgba(0,205,184,0.2);
      backdrop-filter: blur(8px);
      animation: icon-pulse 3s ease-in-out infinite;
    }
    @keyframes icon-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(0,205,184,0); }
      50%      { box-shadow: 0 0 0 12px rgba(0,205,184,0.08); }
    }

    .err-title {
      font-size: 1.75rem;
      font-weight: 900;
      margin-bottom: 0.85rem;
      letter-spacing: -0.5px;
    }
    .err-desc {
      color: rgba(255,255,255,0.5);
      font-size: 0.93rem;
      line-height: 1.75;
      margin-bottom: 2.5rem;
    }
    .err-actions {
      display: flex;
      gap: 0.85rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-err-primary {
      background: linear-gradient(135deg, var(--accent), #009688);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 0.85rem 2.25rem;
      font-family: 'Tajawal', sans-serif;
      font-size: 0.96rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(.4,0,.2,1);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      box-shadow: 0 6px 22px rgba(0,205,184,0.38);
    }
    .btn-err-primary:hover {
      color: #fff;
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 32px rgba(0,205,184,0.55);
    }
    .btn-err-ghost {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.78);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px;
      padding: 0.85rem 2.25rem;
      font-family: 'Tajawal', sans-serif;
      font-size: 0.96rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      backdrop-filter: blur(8px);
    }
    .btn-err-ghost:hover {
      color: #fff;
      background: rgba(255,255,255,0.11);
      border-color: rgba(255,255,255,0.24);
      transform: translateY(-2px);
    }

    .err-footer {
      margin-top: 2rem;
      color: rgba(255,255,255,0.2);
      font-size: 0.7rem;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="grid-pattern"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="err-container">
    <div class="err-glass">
      <div class="err-code">404</div>
      <div class="err-icon-wrap"><i class="fas fa-compass"></i></div>
      <div class="err-title">الصفحة غير موجودة</div>
      <p class="err-desc">
        عذراً، الصفحة التي تبحث عنها غير موجودة أو ربما تم نقلها.<br>
        تحقق من الرابط أو عُد إلى الصفحة الرئيسية.
      </p>
      <div class="err-actions">
        <a href="/" class="btn-err-primary">
          <i class="fas fa-home"></i> الصفحة الرئيسية
        </a>
        <a href="javascript:history.back()" class="btn-err-ghost">
          <i class="fas fa-arrow-right"></i> العودة للخلف
        </a>
      </div>
    </div>
    <div class="err-footer">© 2025 جامعة السودان للعلوم والتكنولوجيا — SUST TMS</div>
  </div>
</body>
</html>
